name: Update B tv+ Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas feedparser

      - run: python collector.py

      - name: Commit updated data
        run: |
          git config user.name "btv-dashboard-bot"
          git config user.email "bot@example.com"
          git add data.csv
          git commit -m "Update data" || echo "No changes"
          git push
